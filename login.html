<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | OmniChat AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        /* تأثير الزجاج - Glassmorphism */
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }
        h2 { margin-bottom: 20px; font-weight: 600; font-size: 24px; color: #38bdf8; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
        button {
            width: 100%;
            padding: 12px;
            background: #0284c7;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0369a1; transform: translateY(-2px); }
        .error-msg { color: #f87171; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" required placeholder="اكتب اسمك هنا...">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">دخول</button>
            <div class="error-msg" id="errorMsg">اسم المستخدم أو كلمة المرور غير صحيحة!</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // منطق التحقق المؤقت لتجربة الواجهة
            if(user === "admin" && pass === "123456") {
                // حفظ حالة الدخول في المتصفح حتى لا يطلبها مجدداً فوراً
                localStorage.setItem('isLoggedIn', 'true');
                // التوجه لصفحة الشات الرئيسية
                window.location.href = "index.html"; 
            } else {
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
